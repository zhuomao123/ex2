# Based upon seaborn-v0_8
# Created by Kyle

axes.axisbelow: True
axes.edgecolor: white
axes.facecolor: E7E7F2
axes.grid: True
#axes.labelcolor: navy
axes.labelsize: 11
axes.linewidth: 0
axes.prop_cycle: cycler('color', ['4766A4','458776','4E2C7A','81C575','4A4597','A5C979','67BA7F','4B89A0'])
axes.titlesize: 15
#axes.titlecolor: navy

date.autoformatter.month  : %Y-%b
date.autoformatter.day    : %Y-%b-%d

figure.facecolor: white
figure.figsize: 12, 7
figure.dpi: 400

font.family: sans-serif
font.sans-serif: Microsoft YaHei, Arial, Liberation Sans, DejaVu Sans, Bitstream Vera Sans, sans-serif

grid.color: white
grid.linestyle: -
grid.linewidth: 1

image.cmap: Greys

legend.loc: best
legend.fontsize: 10
legend.facecolor: dadaf1
legend.framealpha: 0.5
legend.frameon: True
legend.fancybox: True
legend.numpoints: 1
legend.scatterpoints: 1

lines.linewidth: 1.75
lines.markeredgewidth: 0
lines.markersize: 7
lines.solid_capstyle: round

patch.facecolor: 4C72B0
patch.linewidth: .3

savefig.dpi: 400

text.color: .15


xtick.color: .15
xtick.direction: out
xtick.labelsize: 10
xtick.major.pad: 7
xtick.major.size: 0
xtick.major.width: 1
xtick.minor.size: 0
xtick.minor.width: .5


ytick.color: .15
ytick.direction: out
ytick.labelsize: 10
ytick.major.pad: 7
ytick.major.size: 0
ytick.major.width: 1
ytick.minor.size: 0
ytick.minor.width: .5
